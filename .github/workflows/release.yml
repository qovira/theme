name: Release

# Releases are a tag push, not a manual `pnpm publish`. Pushing a version tag
# (e.g. v1.2.3) gates the build on Blacksmith and then publishes @qovira/theme
# to npmjs. Non-tag pushes never reach this workflow. The tag is cut after
# `changeset version` has bumped package.json + written CHANGELOG.md on main —
# see CONTRIBUTING.md "Releases".
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # The full gate, on Blacksmith (writing-workflows): never publish something
  # that doesn't build, lint, typecheck, and test — and never publish a tag whose
  # version disagrees with package.json.
  verify:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # Guard: the tag is the source of truth. A tag whose version does not
      # match package.json fails here, before anything is built or published.
      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          echo "tag=$tag package.json=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Pushed tag v$tag does not match package.json version $pkg"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  # EXCEPTION to the Blacksmith-everywhere rule (writing-workflows): npm Trusted
  # Publishing (OIDC) and provenance attestations work ONLY on GitHub-hosted
  # runners — Blacksmith reports as self-hosted, which the registry rejects with
  # a 422. This is the one job that must leave Blacksmith; keep it as small as
  # possible (build + publish only).
  publish:
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC: trusted-publishing auth + provenance attestation
    steps:
      - uses: actions/checkout@v5

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Scoped public publish with a signed provenance attestation. The tarball
      # is restricted to dist/ via package.json "files". --no-git-checks because
      # the tag checkout is detached. Auth is OIDC trusted publishing: npm
      # exchanges the workflow's id-token with the registry, so no NPM_TOKEN is
      # needed. NODE_AUTH_TOKEN is deliberately left unset — even an empty value
      # would suppress the OIDC path. OIDC requires npm >= 11.5.1; Node 24 LTS
      # bundles npm 11.9+, so `pnpm publish` (which shells out to it) is fine.
      - name: Publish to npm
        run: pnpm publish --access public --provenance --no-git-checks
