name: Release

# Releases are a tag push, not a manual `pnpm publish`. Pushing a version tag
# (e.g. v1.2.3) builds and publishes @qovira/theme to npmjs. Non-tag pushes
# never reach this workflow.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write # required for npm provenance attestation (OIDC → Sigstore)

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      # Guard: the tag is the source of truth. A tag whose version does not
      # match package.json fails here, before anything is published.
      - name: Verify tag matches package.json version
        run: |
          tag="${GITHUB_REF_NAME#v}"
          pkg="$(node -p "require('./package.json').version")"
          echo "tag=$tag package.json=$pkg"
          if [ "$tag" != "$pkg" ]; then
            echo "::error::Pushed tag v$tag does not match package.json version $pkg"
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Scoped public publish with a signed provenance attestation. The tarball
      # is restricted to dist/ via package.json "files". --no-git-checks because
      # the tag checkout is detached. Auth via the NPM_TOKEN automation token
      # (no token is committed). An npm trusted-publisher (OIDC) setup is a
      # viable future alternative to this long-lived token.
      - name: Publish to npm
        run: pnpm publish --access public --provenance --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
