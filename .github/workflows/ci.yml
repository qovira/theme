name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5

      # engine-strict (.npmrc) makes pnpm 11's engines.node (>=22.13) a hard
      # error, and action-setup's self-installer runs under the runner's bundled
      # Node (v20) — setup-node order can't change that. standalone installs
      # @pnpm/exe (Node-bundled pnpm, no engines.node field), so the bootstrap
      # isn't gated on the runner's Node version.
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          standalone: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
