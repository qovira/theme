name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v5

      # Node before pnpm: pnpm/action-setup bootstraps pnpm using the Node on
      # PATH, and the runner default (v20) is below pnpm 11's engines.node
      # (>=22.13) — which engine-strict (.npmrc) makes a hard error. setup-node's
      # `cache: pnpm` needs pnpm present, so it runs again after action-setup.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Set up pnpm
        uses: pnpm/action-setup@v4

      - name: Set up Node with pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
